<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--
    SEO — TODO: replace placeholder strings (NAME, ROLE, URL, IMAGE) with your
    actual values once. Description should be ~155 characters max.
  -->
  <title>Ahmed Emara — Senior Flutter Developer</title>
  <meta name="description" content="Senior Flutter developer specialising in production-grade cross-platform mobile apps. 10+ apps published, 100K+ downloads. Open to new opportunities.">
  <meta name="author" content="Ahmed Emara">
  <meta name="keywords" content="Flutter developer, Dart, mobile apps, iOS, Android, Firebase, cross-platform, freelance, hire, portfolio">
  <meta name="theme-color" content="#030213">

  <!-- Canonical & robots -->
  <link rel="canonical" href="https://your-domain.example/">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (LinkedIn / Facebook / Slack unfurls) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ahmed Emara — Portfolio">
  <meta property="og:title" content="Ahmed Emara — Senior Flutter Developer">
  <meta property="og:description" content="Senior Flutter developer specialising in production-grade cross-platform mobile apps. 10+ apps published, 100K+ downloads.">
  <meta property="og:url" content="https://your-domain.example/">
  <meta property="og:image" content="https://your-domain.example/icons/og-cover.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Ahmed Emara — Senior Flutter Developer">
  <meta property="og:locale" content="en_US">

  <!-- Twitter / X cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ahmed Emara — Senior Flutter Developer">
  <meta name="twitter:description" content="Senior Flutter developer specialising in production-grade cross-platform mobile apps.">
  <meta name="twitter:image" content="https://your-domain.example/icons/og-cover.png">

  <!-- iOS / mobile web app -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon & manifest -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <!--
    JSON-LD structured data — Google uses this for rich-result snippets and
    the Knowledge Graph. Keep `Person.url` and `sameAs` in sync with the
    canonical URL and your real social profiles.
  -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Ahmed Emara",
    "url": "https://your-domain.example/",
    "image": "https://your-domain.example/icons/og-cover.png",
    "jobTitle": "Senior Flutter Developer",
    "description": "Senior Flutter developer specialising in production-grade cross-platform mobile apps.",
    "knowsAbout": [
      "Flutter", "Dart", "Firebase", "iOS", "Android",
      "Cross-platform development", "Mobile architecture"
    ],
    "sameAs": [
      "https://github.com/your-handle",
      "https://www.linkedin.com/in/your-handle"
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Ahmed Emara — Portfolio",
    "url": "https://your-domain.example/",
    "inLanguage": "en"
  }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
