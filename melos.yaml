name: portfolio_workspace

repository: https://github.com/aaita/portfolio

packages:
  - apps/**
  - packages/**

command:
  bootstrap:
    usePubspecOverrides: false

scripts:
  analyze:
    run: melos exec -- dart analyze .

  run:portfolio:
    run: cd apps/portfolio && flutter run -d chrome
    description: Run portfolio web app

  run:dashboard:
    run: cd apps/dashboard && flutter run -d chrome
    description: Run dashboard web app

  build:portfolio:
    run: cd apps/portfolio && flutter build web
    description: Build portfolio for web

  build:dashboard:
    run: cd apps/dashboard && flutter build web
    description: Build dashboard for web
